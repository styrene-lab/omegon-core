<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ω Omegon Dashboard</title>
<style>
  :root {
    --bg: #02030a;
    --card-bg: #080e1a;
    --surface-bg: #0a1020;
    --border: #1a4458;
    --border-dim: #0c1828;
    --fg: #c4d8e4;
    --muted: #607888;
    --dim: #405870;
    --accent: #2ab4c8;
    --accent-muted: #1a8898;
    --success: #22c55e;
    --error: #ef4444;
    --warning: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--border-dim);
    margin-bottom: 16px;
  }
  header h1 { font-size: 16px; color: var(--accent); font-weight: 600; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-dot.connected { background: var(--success); }
  .status-dot.disconnected { background: var(--error); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border-dim);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .card h2 {
    font-size: 13px; color: var(--accent); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .count-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
  .count-badge {
    padding: 2px 8px; border-radius: 4px; font-size: 12px;
    background: var(--surface-bg); color: var(--muted);
  }
  .count-badge.accent { color: var(--accent); }
  .count-badge.success { color: var(--success); }
  .count-badge.warning { color: var(--warning); }
  .count-badge.error { color: var(--error); }

  .node-list { list-style: none; }
  .node-list li {
    padding: 4px 0; border-bottom: 1px solid var(--border-dim);
    display: flex; align-items: center; gap: 8px;
  }
  .node-list li:last-child { border-bottom: none; }
  .node-icon { width: 16px; text-align: center; }
  .node-id { color: var(--dim); font-size: 12px; }
  .node-title { color: var(--fg); flex: 1; }
  .node-questions { color: var(--warning); font-size: 12px; }

  .change-list { list-style: none; }
  .change-list li {
    padding: 4px 0; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border-dim);
  }
  .change-list li:last-child { border-bottom: none; }
  .stage-badge {
    font-size: 11px; padding: 1px 6px; border-radius: 3px;
    background: var(--surface-bg);
  }
  .progress-bar {
    width: 60px; height: 4px; background: var(--border-dim);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; }

  .child-list { list-style: none; }
  .child-list li { padding: 3px 0; display: flex; align-items: center; gap: 8px; }

  .empty { color: var(--dim); font-style: italic; padding: 8px 0; }

  #conversation {
    margin-top: 16px;
    background: var(--card-bg);
    border: 1px solid var(--border-dim);
    border-radius: 8px;
    max-height: 300px;
    overflow-y: auto;
    padding: 12px 16px;
  }
  #conversation h2 { font-size: 13px; color: var(--accent); margin-bottom: 8px; }
  .msg { padding: 4px 0; border-bottom: 1px solid var(--border-dim); }
  .msg:last-child { border-bottom: none; }
  .msg-role { font-size: 11px; color: var(--dim); text-transform: uppercase; }
  .msg-text { white-space: pre-wrap; word-break: break-word; }
  .msg-tool { color: var(--accent-muted); }

  #prompt-bar {
    margin-top: 12px; display: flex; gap: 8px;
  }
  #prompt-bar input {
    flex: 1; padding: 8px 12px;
    background: var(--surface-bg); border: 1px solid var(--border-dim);
    border-radius: 6px; color: var(--fg); font-family: inherit; font-size: 13px;
    outline: none;
  }
  #prompt-bar input:focus { border-color: var(--accent); }
  #prompt-bar button {
    padding: 8px 16px; background: var(--accent); color: var(--bg);
    border: none; border-radius: 6px; font-family: inherit; font-size: 13px;
    cursor: pointer; font-weight: 600;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Ω Omegon Dashboard</h1>
    <div>
      <span class="status-dot" id="ws-status"></span>
      <span id="ws-label" style="color: var(--dim); font-size: 12px; margin-left: 4px;">connecting…</span>
    </div>
  </header>

  <div class="grid">
    <!-- Design Tree -->
    <div class="card">
      <h2>◈ Design Tree</h2>
      <div class="count-row" id="design-counts"></div>
      <div id="design-focused"></div>
      <ul class="node-list" id="design-nodes"></ul>
    </div>

    <!-- OpenSpec -->
    <div class="card">
      <h2>◎ Implementation</h2>
      <div id="openspec-summary"></div>
      <ul class="change-list" id="openspec-changes"></ul>
    </div>

    <!-- Cleave -->
    <div class="card" id="cleave-card" style="display:none;">
      <h2>⚡ Cleave</h2>
      <div id="cleave-summary"></div>
      <ul class="child-list" id="cleave-children"></ul>
    </div>

    <!-- Session -->
    <div class="card">
      <h2>⊙ Session</h2>
      <div id="session-info"></div>
    </div>
  </div>

  <!-- Live conversation stream -->
  <div id="conversation">
    <h2>◌ Conversation</h2>
    <div id="conv-messages"><div class="empty">Waiting for agent activity…</div></div>
  </div>

  <!-- Prompt bar -->
  <div id="prompt-bar">
    <input type="text" id="prompt-input" placeholder="Send a message to the agent…" />
    <button onclick="sendPrompt()">Send</button>
  </div>
</div>

<script>
// ── Auth token from URL ──────────────────────────────────────────
const params = new URLSearchParams(location.search);
const AUTH_TOKEN = params.get('token') || '';

// ── WebSocket connection with auto-reconnect ─────────────────────
let ws = null;
let reconnectTimer = null;
const WS_URL = `ws://${location.host}/ws?token=${encodeURIComponent(AUTH_TOKEN)}`;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('ws-status').className = 'status-dot connected';
    document.getElementById('ws-label').textContent = 'connected';
    if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
  };
  ws.onclose = () => {
    document.getElementById('ws-status').className = 'status-dot disconnected';
    document.getElementById('ws-label').textContent = 'disconnected';
    if (!reconnectTimer) {
      reconnectTimer = setInterval(() => { try { connect(); } catch(e) {} }, 3000);
    }
  };
  ws.onmessage = (e) => {
    try { handleEvent(JSON.parse(e.data)); } catch(err) { console.error('ws parse error:', err); }
  };
}

// ── State ────────────────────────────────────────────────────────
let state = null;
let messages = [];
const MAX_MESSAGES = 50;

function handleEvent(event) {
  switch (event.type) {
    case 'state_snapshot':
      state = event.data;
      renderAll();
      break;
    case 'turn_start':
      addMessage('system', `── Turn ${event.turn} ──`);
      break;
    case 'message_chunk':
      appendToLastMessage('assistant', event.text);
      break;
    case 'thinking_chunk':
      // Don't render thinking in web UI (too noisy)
      break;
    case 'message_end':
      break;
    case 'tool_start':
      addMessage('tool', `▸ ${event.name}`);
      break;
    case 'tool_end':
      const icon = event.is_error ? '✗' : '✓';
      const result = (event.result || '').substring(0, 200);
      addMessage('tool', `${icon} ${result}`);
      break;
    case 'agent_end':
      addMessage('system', '── Agent idle ──');
      break;
    case 'system_notification':
      addMessage('system', event.message);
      break;
    case 'phase_changed':
      addMessage('system', `Phase → ${event.phase}`);
      break;
    case 'decomposition_started':
      addMessage('system', `⚡ Cleave: ${event.children.length} children`);
      break;
    case 'decomposition_child_completed':
      addMessage('system', `${event.success ? '✓' : '✗'} Child '${event.label}'`);
      break;
    case 'decomposition_completed':
      addMessage('system', `⚡ Cleave ${event.merged ? 'merged' : 'completed'}`);
      // Refresh state after cleave
      fetch('/api/state').then(r => r.json()).then(d => { state = d; renderAll(); });
      break;
    default:
      console.log('unhandled event:', event);
  }
}

function addMessage(role, text) {
  messages.push({ role, text });
  if (messages.length > MAX_MESSAGES) messages.shift();
  renderMessages();
}

function appendToLastMessage(role, text) {
  const last = messages[messages.length - 1];
  if (last && last.role === role) {
    last.text += text;
  } else {
    messages.push({ role, text });
    if (messages.length > MAX_MESSAGES) messages.shift();
  }
  renderMessages();
}

// ── Rendering ────────────────────────────────────────────────────
const STATUS_ICONS = {
  seed: '○', exploring: '◐', resolved: '◉', decided: '●',
  implementing: '⚙', implemented: '✓', blocked: '✕', deferred: '◑'
};
const STATUS_COLORS = {
  seed: 'var(--muted)', exploring: 'var(--accent)', resolved: 'var(--success)',
  decided: 'var(--success)', implementing: 'var(--warning)',
  implemented: 'var(--success)', blocked: 'var(--error)', deferred: 'var(--dim)'
};
const STAGE_ICONS = {
  proposed: '◌', specified: '◐', planned: '▸',
  implementing: '⟳', verifying: '◉', archived: '✓'
};

function renderAll() {
  if (!state) return;
  renderDesign();
  renderOpenSpec();
  renderCleave();
  renderSession();
}

function renderDesign() {
  const d = state.design;
  const counts = d.counts;

  // Count badges
  const badges = [];
  if (counts.implementing > 0) badges.push(`<span class="count-badge warning">${counts.implementing} implementing</span>`);
  if (counts.decided > 0) badges.push(`<span class="count-badge success">${counts.decided} decided</span>`);
  if (counts.exploring > 0) badges.push(`<span class="count-badge accent">${counts.exploring} exploring</span>`);
  if (counts.blocked > 0) badges.push(`<span class="count-badge error">${counts.blocked} blocked</span>`);
  if (counts.implemented > 0) badges.push(`<span class="count-badge">${counts.implemented} done</span>`);
  if (counts.open_questions > 0) badges.push(`<span class="count-badge">${counts.open_questions}?</span>`);
  document.getElementById('design-counts').innerHTML = badges.join('') || `<span class="count-badge">${counts.total} nodes</span>`;

  // Focused node
  let focusedHtml = '';
  if (d.focused) {
    const icon = STATUS_ICONS[d.focused.status] || '○';
    const color = STATUS_COLORS[d.focused.status] || 'var(--muted)';
    focusedHtml = `
      <div style="padding: 8px; background: var(--surface-bg); border-radius: 6px; margin-bottom: 8px;">
        <span style="color: ${color}">${icon}</span>
        <strong>${escapeHtml(d.focused.id)}</strong> — ${escapeHtml(d.focused.title)}
        ${d.focused.open_questions.length > 0 ? `<span class="node-questions">${d.focused.open_questions.length}?</span>` : ''}
        ${d.focused.decisions > 0 ? `<span style="color: var(--success); font-size: 12px;">${d.focused.decisions} decisions</span>` : ''}
      </div>`;
  }
  document.getElementById('design-focused').innerHTML = focusedHtml;

  // Actionable + implementing nodes
  const nodes = [...d.implementing, ...d.actionable].slice(0, 10);
  if (nodes.length === 0 && !d.focused) {
    document.getElementById('design-nodes').innerHTML = '<li class="empty">No active design nodes</li>';
  } else {
    document.getElementById('design-nodes').innerHTML = nodes.map(n => `
      <li>
        <span class="node-icon" style="color: ${STATUS_COLORS[n.status] || 'var(--muted)'}">${STATUS_ICONS[n.status] || '○'}</span>
        <span class="node-id">${escapeHtml(n.id)}</span>
        <span class="node-title">${escapeHtml(n.title)}</span>
        ${n.open_questions > 0 ? `<span class="node-questions">${n.open_questions}?</span>` : ''}
      </li>`).join('');
  }
}

function renderOpenSpec() {
  const os = state.openspec;
  if (os.changes.length === 0) {
    document.getElementById('openspec-summary').innerHTML = '<div class="empty">No active changes</div>';
    document.getElementById('openspec-changes').innerHTML = '';
    return;
  }

  const totalPct = os.total_tasks > 0 ? Math.round(os.done_tasks / os.total_tasks * 100) : 0;
  document.getElementById('openspec-summary').innerHTML = `
    <div style="color: var(--dim); font-size: 12px; margin-bottom: 8px;">
      ${os.changes.length} change${os.changes.length > 1 ? 's' : ''} · ${os.done_tasks}/${os.total_tasks} tasks (${totalPct}%)
    </div>`;

  document.getElementById('openspec-changes').innerHTML = os.changes.map(c => {
    const pct = c.total_tasks > 0 ? Math.round(c.done_tasks / c.total_tasks * 100) : 0;
    return `<li>
      <span>${STAGE_ICONS[c.stage] || '◌'}</span>
      <span style="flex: 1;">${escapeHtml(c.name)}</span>
      <span class="stage-badge">${c.stage}</span>
      ${c.total_tasks > 0 ? `
        <span style="color: var(--dim); font-size: 12px;">${c.done_tasks}/${c.total_tasks}</span>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
      ` : ''}
    </li>`;
  }).join('');
}

function renderCleave() {
  const cl = state.cleave;
  const card = document.getElementById('cleave-card');
  if (!cl.active && cl.total_children === 0) {
    card.style.display = 'none';
    return;
  }
  card.style.display = '';

  const done = cl.completed + cl.failed;
  document.getElementById('cleave-summary').innerHTML = cl.active
    ? `<span style="color: var(--warning)">⟳ ${done}/${cl.total_children} children</span>`
    : `<span style="color: ${cl.failed > 0 ? 'var(--error)' : 'var(--success)'}">✓ ${cl.completed} ok, ${cl.failed} failed</span>`;

  document.getElementById('cleave-children').innerHTML = cl.children.map(c => {
    const icons = { completed: '✓', failed: '✗', running: '⟳', pending: '○' };
    const colors = { completed: 'var(--success)', failed: 'var(--error)', running: 'var(--warning)', pending: 'var(--dim)' };
    const dur = c.duration_secs != null ? ` ${c.duration_secs.toFixed(0)}s` : '';
    return `<li>
      <span style="color: ${colors[c.status] || 'var(--dim)'}">${icons[c.status] || '○'}</span>
      <span>${escapeHtml(c.label)}</span>
      <span style="color: var(--dim); font-size: 12px;">${dur}</span>
    </li>`;
  }).join('');
}

function renderSession() {
  const s = state.session;
  document.getElementById('session-info').innerHTML = `
    <div style="color: var(--muted);">${s.turns} turns · ${s.tool_calls} tool calls</div>
    ${s.compactions > 0 ? `<div style="color: var(--dim);">${s.compactions} compactions</div>` : ''}
  `;
}

function renderMessages() {
  const el = document.getElementById('conv-messages');
  if (messages.length === 0) {
    el.innerHTML = '<div class="empty">Waiting for agent activity…</div>';
    return;
  }
  el.innerHTML = messages.map(m => {
    const cls = m.role === 'tool' ? 'msg-tool' : '';
    return `<div class="msg">
      <span class="msg-role">${m.role}</span>
      <div class="msg-text ${cls}">${escapeHtml(m.text)}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Prompt sending ───────────────────────────────────────────────
function sendPrompt() {
  const input = document.getElementById('prompt-input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;

  if (text.startsWith('/')) {
    const [name, ...rest] = text.substring(1).split(' ');
    ws.send(JSON.stringify({ type: 'slash_command', name, args: rest.join(' ') }));
  } else {
    ws.send(JSON.stringify({ type: 'user_prompt', text }));
  }
  addMessage('user', text);
  input.value = '';
}

document.getElementById('prompt-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendPrompt();
});

// ── Boot ─────────────────────────────────────────────────────────
connect();
// Also fetch initial state via HTTP (in case WS is slow)
fetch('/api/state').then(r => r.json()).then(d => { state = d; renderAll(); }).catch(() => {});
// Note: /api/state does not require auth (read-only, localhost). The token
// protects the WebSocket (which accepts commands).
</script>
</body>
</html>
