name: Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'install.sh'
      - '.github/workflows/site.yml'

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/styrene-lab/omegon-site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          # Build context needs both site/ and install.sh
          # Copy install.sh into site/ for the build
          cp install.sh site/install.sh

          TAG="${IMAGE}:sha-${GITHUB_SHA}"
          TAG_LATEST="${IMAGE}:latest"

          docker build \
            -f site/Containerfile \
            -t "$TAG" \
            -t "$TAG_LATEST" \
            site/

          docker push "$TAG"
          docker push "$TAG_LATEST"

          echo "Pushed: $TAG"
          echo "IMAGE_SHA=$TAG" >> $GITHUB_ENV

      - name: Output image reference
        run: |
          echo "## 🌐 Site Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$IMAGE_SHA" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Update deployment:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "image: $IMAGE_SHA" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
